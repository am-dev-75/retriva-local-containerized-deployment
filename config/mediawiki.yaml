tenant_id: local-dev
source_id: src_local_mediawiki
wiki_id: localwiki
api_url: ${MEDIAWIKI_API_URL}
auth_mode: ${MEDIAWIKI_AUTH_MODE}
allowed_namespaces: [0]
include_categories: []
exclude_categories: []
page_title_prefix: null
target_kb_id: default
sync_interval_minutes: 15
delete_policy: soft_delete
availability_policy: allow_partial_during_initial_sync
gateway_base_url: http://retriva-gateway:8002
state_store_path: /app/state/mediawiki-connector-cache.sqlite
request_timeout_seconds: 30
retry_max_attempts: 3
retry_backoff_seconds: 2
